server:
  port: 9001

spring:
  application:
    name: identity-service
  config:
    import: optional:configserver:${CONFIG_SERVER_URL:http://localhost:18888}
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:15432}/${DB_NAME:identity_db}
    username: ${DB_USER:telcox}
    password: ${DB_PASSWORD:telcox}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
        format_sql: true
  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP:localhost:19092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      acks: all
    consumer:
      group-id: identity-service
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: "com.telcox.*"
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:16379}

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_URL:http://localhost:18761/eureka/}

telcox:
  security:
    jwt:
      secret: ${JWT_SECRET:please-change-in-production-min-32-bytes-secret-key}
      access-token-validity-minutes: 15
      refresh-token-validity-days: 7
      issuer: telcox-identity

springdoc:
  swagger-ui:
    path: /swagger-ui.html
