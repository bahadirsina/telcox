apiVersion: apps/v1
kind: Deployment
metadata:
  name: bff-service
  namespace: telcox-local
  labels:
    app: bff-service
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: bff-service
  template:
    metadata:
      labels:
        app: bff-service
    spec:
      containers:
        - name: bff-service
          image: telcox/bff-service:1.0.0-SNAPSHOT
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 9011
          envFrom:
            - configMapRef:
                name: telcox-common-config
          env:
            - name: JAVA_OPTS
              value: "-Xms16m -Xmx160m -XX:MaxMetaspaceSize=128m -XX:ReservedCodeCacheSize=32m -XX:MaxDirectMemorySize=64m -Xss512k -XX:+UseSerialGC -XX:ActiveProcessorCount=2"
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 9011
            initialDelaySeconds: 120
            timeoutSeconds: 5
            periodSeconds: 15
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: 9011
            initialDelaySeconds: 300
            timeoutSeconds: 5
            periodSeconds: 30
---
apiVersion: v1
kind: Service
metadata:
  name: bff-service
  namespace: telcox-local
  labels:
    app: bff-service
spec:
  type: ClusterIP
  selector:
    app: bff-service
  ports:
    - name: http
      port: 9011
      targetPort: 9011
