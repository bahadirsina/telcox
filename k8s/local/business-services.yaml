apiVersion: apps/v1
kind: Deployment
metadata:
  name: identity-service
  namespace: telcox-local
  labels:
    app: identity-service
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: identity-service
  template:
    metadata:
      labels:
        app: identity-service
    spec:
      containers:
        - name: identity-service
          image: telcox/identity-service:1.0.0-SNAPSHOT
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 9001
          envFrom:
            - configMapRef:
                name: telcox-common-config
          env:
            - name: DB_HOST
              value: identity-postgres
            - name: DB_PORT
              value: "5432"
            - name: DB_NAME
              value: identity_db
            - name: DB_USER
              valueFrom:
                secretKeyRef:
                  name: telcox-local-secret
                  key: DB_USER
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: telcox-local-secret
                  key: DB_PASSWORD
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: telcox-local-secret
                  key: JWT_SECRET
            - name: JAVA_OPTS
              value: "-Xms16m -Xmx128m -XX:MaxMetaspaceSize=192m -XX:ReservedCodeCacheSize=32m -XX:MaxDirectMemorySize=32m -Xss512k -XX:+UseSerialGC -XX:ActiveProcessorCount=2"
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 9001
            initialDelaySeconds: 90
            periodSeconds: 15
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: 9001
            initialDelaySeconds: 300
            timeoutSeconds: 5
            periodSeconds: 30
---
apiVersion: v1
kind: Service
metadata:
  name: identity-service
  namespace: telcox-local
  labels:
    app: identity-service
spec:
  selector:
    app: identity-service
  ports:
    - name: http
      port: 9001
      targetPort: 9001
---
