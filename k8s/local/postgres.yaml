apiVersion: apps/v1
kind: Deployment
metadata:
  name: identity-postgres
  namespace: telcox-local
  labels:
    app: identity-postgres
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: identity-postgres
  template:
    metadata:
      labels:
        app: identity-postgres
    spec:
      containers:
        - name: postgres
          image: postgres:16-alpine
          args: ["postgres", "-c", "wal_level=logical", "-c", "max_replication_slots=20", "-c", "max_wal_senders=20"]
          ports:
            - containerPort: 5432
          env:
            - name: POSTGRES_DB
              value: identity_db
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: telcox-local-secret
                  key: DB_USER
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: telcox-local-secret
                  key: DB_PASSWORD
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", "telcox", "-d", "identity_db"]
            initialDelaySeconds: 30
            timeoutSeconds: 5
            periodSeconds: 15
          livenessProbe:
            exec:
              command: ["pg_isready", "-U", "telcox", "-d", "identity_db"]
            initialDelaySeconds: 300
            timeoutSeconds: 5
            periodSeconds: 30
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
      volumes:
        - name: data
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: identity-postgres
  namespace: telcox-local
  labels:
    app: identity-postgres
spec:
  selector:
    app: identity-postgres
  ports:
    - name: postgres
      port: 5432
      targetPort: 5432
---
