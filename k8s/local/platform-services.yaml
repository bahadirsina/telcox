apiVersion: apps/v1
kind: Deployment
metadata:
  name: prometheus
  namespace: telcox-local
  labels:
    app: prometheus
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: prometheus
  template:
    metadata:
      labels:
        app: prometheus
    spec:
      containers:
        - name: prometheus
          image: prom/prometheus:v2.55.1
          args:
            - --config.file=/etc/prometheus/prometheus.yml
            - --storage.tsdb.path=/prometheus
          ports:
            - containerPort: 9090
          readinessProbe:
            httpGet:
              path: /-/ready
              port: 9090
            initialDelaySeconds: 60
            timeoutSeconds: 5
            periodSeconds: 15
          livenessProbe:
            httpGet:
              path: /-/healthy
              port: 9090
            initialDelaySeconds: 180
            timeoutSeconds: 5
            periodSeconds: 30
          volumeMounts:
            - name: config
              mountPath: /etc/prometheus
            - name: data
              mountPath: /prometheus
      volumes:
        - name: config
          configMap:
            name: prometheus-config
        - name: data
          emptyDir: {}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  namespace: telcox-local
data:
  prometheus.yml: |
    global:
      scrape_interval: 15s
    scrape_configs:
      - job_name: prometheus
        static_configs:
          - targets: ["localhost:9090"]
      - job_name: telcox-services
        metrics_path: /actuator/prometheus
        static_configs:
          - targets:
              - api-gateway:8080
              - bff-service:9011
              - identity-service:9001
              - customer-service:9002
              - product-catalog-service:9003
              - order-service:9004
              - subscription-service:9005
              - usage-service:9006
              - billing-service:9007
              - payment-service:9008
              - notification-service:9009
              - ticket-service:9010
---
apiVersion: v1
kind: Service
metadata:
  name: prometheus
  namespace: telcox-local
  labels:
    app: prometheus
spec:
  selector:
    app: prometheus
  ports:
    - name: http
      port: 9090
      targetPort: 9090
---
