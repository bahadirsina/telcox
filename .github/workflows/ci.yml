name: CI

on:
  push:
    branches:
      - main
      - codex/**
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  java:
    name: Maven verify
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Verify Java modules
        run: mvn -B -ntp verify

  frontend:
    name: Frontend build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

  kubernetes:
    name: Local Kubernetes manifests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up kubectl
        uses: azure/setup-kubectl@v4

      - name: Render kustomize output
        run: |
          kubectl kustomize k8s/local > /tmp/telcox-local.yaml
          test -s /tmp/telcox-local.yaml

  sonar:
    name: Sonar analysis
    runs-on: ubuntu-latest
    needs:
      - java
    env:
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
      SONAR_HOST_URL: ${{ vars.SONAR_HOST_URL }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Run Sonar
        if: env.SONAR_TOKEN != ''
        run: |
          set -euo pipefail
          host_url="${SONAR_HOST_URL:-https://sonarcloud.io}"
          mvn -B -ntp verify org.sonarsource.scanner.maven:sonar-maven-plugin:sonar \
            -Dsonar.token="${SONAR_TOKEN}" \
            -Dsonar.host.url="${host_url}"

      - name: Skip Sonar
        if: env.SONAR_TOKEN == ''
        run: echo "SONAR_TOKEN is not configured; skipping Sonar analysis."

  container-images:
    name: Docker build and push
    runs-on: ubuntu-latest
    needs:
      - java
      - frontend
    if: github.event_name != 'pull_request'
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Package Java artifacts
        run: mvn -B -ntp package -DskipTests

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push images
        env:
          OWNER: ${{ github.repository_owner }}
          SHA: ${{ github.sha }}
          REF_NAME: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          owner="$(echo "${OWNER}" | tr '[:upper:]' '[:lower:]')"
          registry="ghcr.io/${owner}/telcox"
          images=(
            "discovery-server infrastructure/discovery-server"
            "config-server infrastructure/config-server"
            "api-gateway infrastructure/api-gateway"
            "bff-service services/bff-service"
            "identity-service services/identity-service"
            "customer-service services/customer-service"
            "product-catalog-service services/product-catalog-service"
            "order-service services/order-service"
            "subscription-service services/subscription-service"
            "usage-service services/usage-service"
            "billing-service services/billing-service"
            "payment-service services/payment-service"
            "notification-service services/notification-service"
            "ticket-service services/ticket-service"
            "signal-atlas-web ."
          )
          for item in "${images[@]}"; do
            image="${item%% *}"
            context="${item#* }"
            if [ "${image}" = "signal-atlas-web" ]; then
              docker build -f frontend/Dockerfile -t "${registry}/${image}:${SHA}" "${context}"
            else
              docker build -t "${registry}/${image}:${SHA}" "${context}"
            fi
            docker push "${registry}/${image}:${SHA}"
            if [ "${REF_NAME}" = "main" ]; then
              docker tag "${registry}/${image}:${SHA}" "${registry}/${image}:latest"
              docker push "${registry}/${image}:latest"
            fi
          done
