server:
  port: 8888
spring:
  application:
    name: config-server
  profiles:
    active: native
  cloud:
    config:
      server:
        native:
          search-locations: classpath:/config/,classpath:/config/{application}/
eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_URL:http://localhost:18761/eureka/}
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
