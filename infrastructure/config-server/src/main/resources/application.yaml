server:
  port: 8888
spring:
  application:
    name: config-server
  profiles:
    active: native
  cloud:
    config:
      server:
        native:
          search-locations:
            - classpath:/config/
            - classpath:/config/{application}/
eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_URL:http://localhost:18761/eureka/}
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  metrics:
    tags:
      application: ${spring.application.name}
      environment: ${telcox.environment:local}
  tracing:
    sampling:
      probability: ${TRACING_SAMPLING_PROBABILITY:1.0}
    export:
      zipkin:
        endpoint: ${ZIPKIN_TRACING_ENDPOINT:http://localhost:19411/api/v2/spans}
logging:
  include-application-name: false
  structured:
    format:
      console: ${LOGGING_STRUCTURED_FORMAT:ecs}
