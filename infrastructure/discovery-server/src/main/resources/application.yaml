server:
  port: 8761
spring:
  application:
    name: discovery-server
eureka:
  client:
    register-with-eureka: false
    fetch-registry: false
    service-url:
      defaultZone: http://localhost:18761/eureka/
  server:
    enable-self-preservation: false
    eviction-interval-timer-in-ms: 15000
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: always
      probes:
        enabled: true
  health:
    livenessstate:
      enabled: true
    readinessstate:
      enabled: true
  metrics:
    tags:
      application: ${spring.application.name}
      environment: ${telcox.environment:local}
  tracing:
    sampling:
      probability: ${TRACING_SAMPLING_PROBABILITY:1.0}
    export:
      zipkin:
        endpoint: ${ZIPKIN_TRACING_ENDPOINT:http://localhost:19411/api/v2/spans}
logging:
  include-application-name: false
  structured:
    format:
      console: ${LOGGING_STRUCTURED_FORMAT:ecs}
