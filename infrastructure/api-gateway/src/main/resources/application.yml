server:
  port: 8080

spring:
  application:
    name: api-gateway
  config:
    import: optional:configserver:${CONFIG_SERVER_URL:http://localhost:18888}

  # ---------------------------------------------------------------------------
  # SEC-03 — OAuth2 Resource Server: gelen JWT'leri Keycloak realm'ine karşı doğrula.
  # issuer-uri Keycloak realm endpoint'idir; gateway JWKS'i oradan otomatik çeker.
  # docker profilinde host 'keycloak' (compose servisi), default'ta lokal host portu.
  # ---------------------------------------------------------------------------
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${KEYCLOAK_ISSUER_URI:http://localhost:18083/realms/telcox}

  cloud:
    gateway:
      discovery:
        locator:
          enabled: true
          lower-case-service-id: true

      # INF-04 — tüm route'lara uygulanan global filtreler (rate limit).
      # Correlation-Id ve CORS Java tarafında (CorrelationIdFilter / CorsConfig) yönetilir.
      default-filters:
        - name: RequestRateLimiter
          args:
            key-resolver: "#{@userOrIpKeyResolver}"
            redis-rate-limiter.replenishRate: ${RL_REPLENISH:20}
            redis-rate-limiter.burstCapacity: ${RL_BURST:40}
            redis-rate-limiter.requestedTokens: 1

      routes:
        - id: identity-service
          uri: lb://identity-service
          predicates:
            - Path=/api/v1/auth/**,/api/v1/users/**
        - id: customer-service
          uri: lb://customer-service
          predicates:
            - Path=/api/v1/customers/**
        - id: product-catalog-service
          uri: lb://product-catalog-service
          predicates:
            - Path=/api/v1/products/**,/api/v1/plans/**,/api/v1/tariffs/**,/api/v1/addons/**
        - id: order-service
          uri: lb://order-service
          predicates:
            - Path=/api/v1/orders/**
        - id: subscription-service
          uri: lb://subscription-service
          predicates:
            - Path=/api/v1/subscriptions/**
        - id: usage-service
          uri: lb://usage-service
          predicates:
            - Path=/api/v1/usage/**
        - id: billing-service
          uri: lb://billing-service
          predicates:
            - Path=/api/v1/invoices/**,/api/v1/billing/**
        - id: payment-service
          uri: lb://payment-service
          predicates:
            - Path=/api/v1/payments/**
        - id: notification-service
          uri: lb://notification-service
          predicates:
            - Path=/api/v1/notifications/**
        - id: ticket-service
          uri: lb://ticket-service
          predicates:
            - Path=/api/v1/tickets/**

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:16379}

# INF-04 — CORS izinli origin'ler (CorsConfig okur)
telcox:
  gateway:
    cors:
      allowed-origins: ${GATEWAY_CORS_ORIGINS:http://localhost:5173,http://localhost:15173}

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_URL:http://localhost:18761/eureka/}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus,gateway
