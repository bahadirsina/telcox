      config-server:
        condition: service_healthy
    ports:
      - "19004:9004"
    environment:
      <<: *service-common-env
      DB_HOST: order-postgres
      DB_PORT: 5432
      DB_NAME: order_db
      DB_USER: telcox
      DB_PASSWORD: telcox
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9004/actuator/health | grep -q '\"status\":\"UP\"' || exit 1"]
      <<: *healthcheck-spring

  subscription-service:
    <<: *service-common
    build:
      context: ./services/subscription-service
    image: telcox/subscription-service:1.0.0-SNAPSHOT
    container_name: telcox-subscription-service
    depends_on:
      subscription-postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
      discovery-server:
        condition: service_healthy
      config-server:
        condition: service_healthy
    ports:
      - "19005:9005"
    environment:
      <<: *service-common-env
      DB_HOST: subscription-postgres
      DB_PORT: 5432
      DB_NAME: subscription_db
      DB_USER: telcox
      DB_PASSWORD: telcox
    healthcheck:
