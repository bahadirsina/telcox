name: telcox

# =============================================================================
# Telco CRM Platform - Tum Sistem (Database-per-Service)
#
# Topoloji:
#   - 10 ayri PostgreSQL container'i (her mikroservisin kendi veritabani)
#   - 3 altyapi servisi (discovery-server, config-server, api-gateway)
#   - 10 is mikroservisi (identity, customer, product-catalog, order,
#     subscription, usage, billing, payment, notification, ticket)
#   - Destekleyici servisler: Kafka, Redis, Zipkin, MailHog, pgAdmin, Kafka-UI
#
# Kullanim:
#   1) mvn clean package -DskipTests           (parent dizinde, JAR'lari uretir)
#   2) docker compose up -d                    (tum sistem ayaga kalkar)
#
# Host port araligi (1xxxx ile shift): baska projeler/yerel kurulumlarla
# cakismamasi icin tum host portlari yuksek araliga alindi. Container icinde
# servisler hala standart portlari kullanir (5432, 9001-9010, vb.).
#
# Bagimsiz PostgreSQL'ler host portlari:
#   15432=identity, 15433=customer, 15434=product, 15435=order, 15436=subscription,
#   15437=usage,    15438=billing,  15439=payment, 15440=notification, 15441=ticket
#
# Diger host portlari:
#   16379=redis, 19092=kafka, 18090=kafka-ui, 18084=kafka-connect, 19411=zipkin,
#   11025=mailhog-smtp, 18025=mailhog-web, 15050=pgadmin,
#   18761=eureka, 18888=config-server, 18080=api-gateway,
#   19001..19011 = is mikroservisleri ve BFF
# =============================================================================

networks:
  telcox-net:
    driver: bridge

volumes:
  identity_pg_data:
  customer_pg_data:
  product_pg_data:
  order_pg_data:
  subscription_pg_data:
  usage_pg_data:
  billing_pg_data:
  payment_pg_data:
  notification_pg_data:
  ticket_pg_data:
  keycloak_pg_data:
  pgadmin_data:

# -----------------------------------------------------------------------------
# Tekrar eden alanlar icin YAML anchor'lari
# -----------------------------------------------------------------------------
x-postgres-common: &postgres-common
  image: postgres:16-alpine
  command: ["postgres", "-c", "wal_level=logical", "-c", "max_replication_slots=20", "-c", "max_wal_senders=20"]
  restart: unless-stopped
  networks:
    - telcox-net

# Spring Boot servisleri icin ortak healthcheck parametreleri
# Test komutu her serviste port'a gore override edilir.
x-healthcheck-spring: &healthcheck-spring
  interval: 15s
  timeout: 5s
  retries: 5
  start_period: 90s

x-service-common: &service-common
  restart: unless-stopped
  networks:
    - telcox-net
  environment: &service-common-env
    SPRING_PROFILES_ACTIVE: prod
    KAFKA_BOOTSTRAP: kafka:29092
    REDIS_HOST: redis
    REDIS_PORT: 6379
    EUREKA_URL: http://discovery-server:8761/eureka/
    CONFIG_SERVER_URL: http://config-server:8888
    SPRING_ZIPKIN_BASE_URL: http://zipkin:9411
    JAVA_OPTS: "-Xms64m -Xmx256m -XX:MaxMetaspaceSize=128m"

# Tek resmi Debezium registry/tag'i. Kafka Connect worker bu image'i kullanır.
x-debezium-connect-image: &debezium-connect-image quay.io/debezium/connect:2.7.3.Final

services:

  # ===========================================================================
  # ALTYAPI (paylasilan)
  # ===========================================================================

  redis:
    image: redis:7-alpine
    container_name: telcox-redis
    restart: unless-stopped
    ports:
      - "16379:6379"
    networks:
      - telcox-net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  kafka:
    image: confluentinc/cp-kafka:7.7.1
    container_name: telcox-kafka
    restart: unless-stopped
    ports:
      - "19092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:29092,CONTROLLER://0.0.0.0:9093,PLAINTEXT_HOST://0.0.0.0:9092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:19092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      CLUSTER_ID: telcox-kafka-cluster-id-01
    networks:
      - telcox-net
    healthcheck:
      test: ["CMD-SHELL", "kafka-topics --bootstrap-server kafka:29092 --list || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 15

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: telcox-kafka-ui
    restart: unless-stopped
    depends_on:
      kafka:
        condition: service_healthy
    ports:
      - "18090:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: telcox
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:29092
    networks:
      - telcox-net

  # Debezium PostgreSQL connector eklentisini içeren Kafka Connect worker.
  # Servis bazlı connector tanımları EVT-05 kapsamında REST API ile yüklenecek.
  kafka-connect-topic-init:
    image: confluentinc/cp-kafka:7.7.1
    container_name: telcox-kafka-connect-topic-init
    restart: "no"
    depends_on:
      kafka:
        condition: service_healthy
    command:
      - bash
      - -ec
      - |
        # Önceki telcox_connect_* standardından geçiş: Connect state'i yeniden
        # oluşturulur; connector tanımları infrastructure/debezium/connectors'tan yüklenir.
        for topic in telcox_connect_configs telcox_connect_offsets telcox_connect_status; do
          kafka-topics --bootstrap-server kafka:29092 --delete --if-exists --topic "$$topic"
        done
        while kafka-topics --bootstrap-server kafka:29092 --list | grep -Eq '^telcox_connect_(configs|offsets|status)$$'; do
          sleep 2
        done
        for topic in telcox.connect.configs telcox.connect.offsets telcox.connect.statuses; do
          kafka-topics --bootstrap-server kafka:29092 --create --if-not-exists --topic "$$topic" --partitions 1 --replication-factor 1 --config cleanup.policy=compact
        done
    networks:
      - telcox-net

  kafka-connect:
    image: *debezium-connect-image
    container_name: telcox-kafka-connect
    restart: unless-stopped
    depends_on:
      kafka-connect-topic-init:
        condition: service_completed_successfully
    ports:
      - "18084:8083"
    environment:
      BOOTSTRAP_SERVERS: kafka:29092
      GROUP_ID: telcox-debezium-connect
      CONFIG_STORAGE_TOPIC: telcox.connect.configs
      OFFSET_STORAGE_TOPIC: telcox.connect.offsets
      STATUS_STORAGE_TOPIC: telcox.connect.statuses
      CONFIG_STORAGE_REPLICATION_FACTOR: 1
      OFFSET_STORAGE_REPLICATION_FACTOR: 1
      STATUS_STORAGE_REPLICATION_FACTOR: 1
      KEY_CONVERTER: org.apache.kafka.connect.json.JsonConverter
      VALUE_CONVERTER: org.apache.kafka.connect.json.JsonConverter
      KEY_CONVERTER_SCHEMAS_ENABLE: "false"
      VALUE_CONVERTER_SCHEMAS_ENABLE: "false"
    networks:
      - telcox-net
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8083/connectors >/dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s

  zipkin:
    image: openzipkin/zipkin:latest
    container_name: telcox-zipkin
    restart: unless-stopped
    ports:
      - "19411:9411"
    networks:
      - telcox-net

  mailhog:
    image: mailhog/mailhog:latest
    container_name: telcox-mailhog
    platform: linux/amd64
    restart: unless-stopped
    ports:
      - "11025:1025"
      - "18025:8025"
    networks:
      - telcox-net
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8025/api/v2/messages >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: telcox-pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@telcox.com
      PGADMIN_DEFAULT_PASSWORD: admin
      PGADMIN_CONFIG_SERVER_MODE: "False"
      PGADMIN_CONFIG_MASTER_PASSWORD_REQUIRED: "False"
    ports:
      - "15050:80"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
      - ./docker/pgadmin/servers.json:/pgadmin4/servers.json:ro
    networks:
      - telcox-net

  # ===========================================================================
  # POSTGRESQL CONTAINER'LARI - HER SERVICE ICIN AYRI INSTANCE
  # ===========================================================================

  identity-postgres:
    <<: *postgres-common
    container_name: telcox-identity-postgres
    environment:
      POSTGRES_DB: identity_db
      POSTGRES_USER: telcox
      POSTGRES_PASSWORD: telcox
    ports:
      - "15432:5432"
    volumes:
      - identity_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U telcox -d identity_db"]
      interval: 5s
      timeout: 5s
      retries: 15

  customer-postgres:
    <<: *postgres-common
    container_name: telcox-customer-postgres
    environment:
      POSTGRES_DB: customer_db
      POSTGRES_USER: telcox
      POSTGRES_PASSWORD: telcox
    ports:
      - "15433:5432"
    volumes:
      - customer_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U telcox -d customer_db"]
      interval: 5s
      timeout: 5s
      retries: 15

  product-postgres:
    <<: *postgres-common
    container_name: telcox-product-postgres
    environment:
      POSTGRES_DB: product_db
      POSTGRES_USER: telcox
      POSTGRES_PASSWORD: telcox
    ports:
      - "15434:5432"
    volumes:
      - product_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U telcox -d product_db"]
      interval: 5s
      timeout: 5s
      retries: 15

  order-postgres:
    <<: *postgres-common
    container_name: telcox-order-postgres
    environment:
      POSTGRES_DB: order_db
      POSTGRES_USER: telcox
      POSTGRES_PASSWORD: telcox
    ports:
      - "15435:5432"
    volumes:
      - order_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U telcox -d order_db"]
      interval: 5s
      timeout: 5s
      retries: 15

  subscription-postgres:
    <<: *postgres-common
    container_name: telcox-subscription-postgres
    environment:
      POSTGRES_DB: subscription_db
      POSTGRES_USER: telcox
      POSTGRES_PASSWORD: telcox
    ports:
      - "15436:5432"
    volumes:
      - subscription_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U telcox -d subscription_db"]
      interval: 5s
      timeout: 5s
      retries: 15

  usage-postgres:
    <<: *postgres-common
    container_name: telcox-usage-postgres
    environment:
      POSTGRES_DB: usage_db
      POSTGRES_USER: telcox
      POSTGRES_PASSWORD: telcox
    ports:
      - "15437:5432"
    volumes:
      - usage_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U telcox -d usage_db"]
      interval: 5s
      timeout: 5s
      retries: 15

  billing-postgres:
    <<: *postgres-common
    container_name: telcox-billing-postgres
    environment:
      POSTGRES_DB: billing_db
      POSTGRES_USER: telcox
      POSTGRES_PASSWORD: telcox
    ports:
      - "15438:5432"
    volumes:
      - billing_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U telcox -d billing_db"]
      interval: 5s
      timeout: 5s
      retries: 15

  payment-postgres:
    <<: *postgres-common
    container_name: telcox-payment-postgres
    environment:
      POSTGRES_DB: payment_db
      POSTGRES_USER: telcox
      POSTGRES_PASSWORD: telcox
    ports:
      - "15439:5432"
    volumes:
      - payment_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U telcox -d payment_db"]
      interval: 5s
      timeout: 5s
      retries: 15

  notification-postgres:
    <<: *postgres-common
    container_name: telcox-notification-postgres
    environment:
      POSTGRES_DB: notification_db
      POSTGRES_USER: telcox
      POSTGRES_PASSWORD: telcox
    ports:
      - "15440:5432"
    volumes:
      - notification_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U telcox -d notification_db"]
      interval: 5s
      timeout: 5s
      retries: 15

  ticket-postgres:
    <<: *postgres-common
    container_name: telcox-ticket-postgres
    environment:
      POSTGRES_DB: ticket_db
      POSTGRES_USER: telcox
      POSTGRES_PASSWORD: telcox
    ports:
      - "15441:5432"
    volumes:
      - ticket_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U telcox -d ticket_db"]
      interval: 5s
      timeout: 5s
      retries: 15

  # ===========================================================================
  # ALTYAPI MIKROSERVISLERI (Spring Cloud)
  # ===========================================================================

  discovery-server:
    build:
      context: ./infrastructure/discovery-server
    image: telcox/discovery-server:1.0.0-SNAPSHOT
    container_name: telcox-discovery-server
    restart: unless-stopped
    ports:
      - "18761:8761"
    environment:
      JAVA_OPTS: "-Xms64m -Xmx256m -XX:MaxMetaspaceSize=128m"
    networks:
      - telcox-net
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8761/actuator/health | grep -q '\"status\":\"UP\"' || exit 1"]
      <<: *healthcheck-spring

  config-server:
    build:
      context: ./infrastructure/config-server
    image: telcox/config-server:1.0.0-SNAPSHOT
    container_name: telcox-config-server
    restart: unless-stopped
    depends_on:
      discovery-server:
        condition: service_healthy
    ports:
      - "18888:8888"
    environment:
      EUREKA_URL: http://discovery-server:8761/eureka/
      JAVA_OPTS: "-Xms64m -Xmx256m -XX:MaxMetaspaceSize=128m"
    networks:
      - telcox-net
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8888/actuator/health | grep -q '\"status\":\"UP\"' || exit 1"]
      <<: *healthcheck-spring

  keycloak-postgres:
    image: postgres:16-alpine
    container_name: telcox-keycloak-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: keycloak
      POSTGRES_USER: ${KC_DB_USER:-keycloak}
      POSTGRES_PASSWORD: ${KC_DB_PASSWORD:-keycloak}
    ports:
      - "15442:5432"
    volumes:
      - keycloak_pg_data:/var/lib/postgresql/data
    networks:
      - telcox-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${KC_DB_USER:-keycloak} -d keycloak"]
      interval: 10s
      timeout: 5s
      retries: 5

  keycloak:
    image: quay.io/keycloak/keycloak:26.1
    container_name: telcox-keycloak
    restart: unless-stopped
    command: ["start-dev", "--import-realm"]
    environment:
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://keycloak-postgres:5432/keycloak
      KC_DB_USERNAME: ${KC_DB_USER:-keycloak}
      KC_DB_PASSWORD: ${KC_DB_PASSWORD:-keycloak}
      KC_BOOTSTRAP_ADMIN_USERNAME: ${KEYCLOAK_ADMIN:-admin}
      KC_BOOTSTRAP_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD:-admin}
      KC_HOSTNAME_STRICT: "false"
      KC_HTTP_ENABLED: "true"
      KC_HEALTH_ENABLED: "true"
    ports:
      - "18083:8080"
    volumes:
      - ./infrastructure/keycloak/realm-export:/opt/keycloak/data/import:ro
    depends_on:
      keycloak-postgres:
        condition: service_healthy
    networks:
      - telcox-net
    healthcheck:
      test: ["CMD-SHELL", "exec 3<>/dev/tcp/localhost/9000 && echo -e 'GET /health/ready HTTP/1.1\\r\\nhost: localhost\\r\\nConnection: close\\r\\n\\r\\n' >&3 && cat <&3 | grep -q '200 OK'"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 60s

  api-gateway:
    build:
      context: ./infrastructure/api-gateway
    image: telcox/api-gateway:1.0.0-SNAPSHOT
    container_name: telcox-api-gateway
    restart: unless-stopped
    depends_on:
      discovery-server:
        condition: service_healthy
      config-server:
        condition: service_healthy
      redis:
        condition: service_healthy
      keycloak:
        condition: service_healthy
    ports:
      - "18080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: prod
      EUREKA_URL: http://discovery-server:8761/eureka/
      KEYCLOAK_ISSUER_URI: http://localhost:18083/realms/telcox
      KEYCLOAK_JWK_SET_URI: http://keycloak:8080/realms/telcox/protocol/openid-connect/certs
      CONFIG_SERVER_URL: http://config-server:8888
      REDIS_HOST: redis
      REDIS_PORT: 6379
      JAVA_OPTS: "-Xms64m -Xmx256m -XX:MaxMetaspaceSize=128m"
    networks:
      - telcox-net
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8080/actuator/health | grep -q '\"status\":\"UP\"' || exit 1"]
      <<: *healthcheck-spring

  bff-service:
    <<: *service-common
    build:
      context: ./services/bff-service
    image: telcox/bff-service:1.0.0-SNAPSHOT
    container_name: telcox-bff-service
    depends_on:
      redis:
        condition: service_healthy
      discovery-server:
        condition: service_healthy
      config-server:
        condition: service_healthy
      order-service:
        condition: service_healthy
      subscription-service:
        condition: service_healthy
    ports:
      - "19011:9011"
    environment:
      <<: *service-common-env
      CUSTOMER_SERVICE_URL: http://customer-service:9002
      ORDER_SERVICE_URL: http://order-service:9004
      SUBSCRIPTION_SERVICE_URL: http://subscription-service:9005
      BILLING_SERVICE_URL: http://billing-service:9007
      TICKET_SERVICE_URL: http://ticket-service:9010
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9011/actuator/health | grep -q '\"status\":\"UP\"' || exit 1"]
      <<: *healthcheck-spring

  # ===========================================================================
  # IS MIKROSERVISLERI
  # ===========================================================================

  identity-service:
    <<: *service-common
    build:
      context: ./services/identity-service
    image: telcox/identity-service:1.0.0-SNAPSHOT
    container_name: telcox-identity-service
    depends_on:
      identity-postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
      discovery-server:
        condition: service_healthy
      config-server:
        condition: service_healthy
    ports:
      - "19001:9001"
    environment:
      <<: *service-common-env
      DB_HOST: identity-postgres
      DB_PORT: 5432
      DB_NAME: identity_db
      DB_USER: telcox
      DB_PASSWORD: telcox
      JWT_SECRET: telcox-local-dev-secret-key-please-change-in-production
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9001/actuator/health | grep -q '\"status\":\"UP\"' || exit 1"]
      <<: *healthcheck-spring

  customer-service:
    <<: *service-common
    build:
      context: ./services/customer-service
    image: telcox/customer-service:1.0.0-SNAPSHOT
    container_name: telcox-customer-service
    depends_on:
      customer-postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
      discovery-server:
        condition: service_healthy
      config-server:
        condition: service_healthy
    ports:
      - "19002:9002"
    environment:
      <<: *service-common-env
      DB_HOST: customer-postgres
      DB_PORT: 5432
      DB_NAME: customer_db
      DB_USER: telcox
      DB_PASSWORD: telcox
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9002/actuator/health | grep -q '\"status\":\"UP\"' || exit 1"]
      <<: *healthcheck-spring

  product-catalog-service:
    <<: *service-common
    build:
      context: ./services/product-catalog-service
    image: telcox/product-catalog-service:1.0.0-SNAPSHOT
    container_name: telcox-product-catalog-service
    depends_on:
      product-postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
      discovery-server:
        condition: service_healthy
      config-server:
        condition: service_healthy
    ports:
      - "19003:9003"
    environment:
      <<: *service-common-env
      DB_HOST: product-postgres
      DB_PORT: 5432
      DB_NAME: product_db
      DB_USER: telcox
      DB_PASSWORD: telcox
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9003/actuator/health | grep -q '\"status\":\"UP\"' || exit 1"]
      <<: *healthcheck-spring

  order-service:
    <<: *service-common
    build:
      context: ./services/order-service
    image: telcox/order-service:1.0.0-SNAPSHOT
    container_name: telcox-order-service
    depends_on:
      order-postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
      discovery-server:
        condition: service_healthy
      config-server:
        condition: service_healthy
    ports:
      - "19004:9004"
    environment:
      <<: *service-common-env
      DB_HOST: order-postgres
      DB_PORT: 5432
      DB_NAME: order_db
      DB_USER: telcox
      DB_PASSWORD: telcox
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9004/actuator/health | grep -q '\"status\":\"UP\"' || exit 1"]
      <<: *healthcheck-spring

  subscription-service:
    <<: *service-common
    build:
      context: ./services/subscription-service
    image: telcox/subscription-service:1.0.0-SNAPSHOT
    container_name: telcox-subscription-service
    depends_on:
      subscription-postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
      discovery-server:
        condition: service_healthy
      config-server:
        condition: service_healthy
    ports:
      - "19005:9005"
    environment:
      <<: *service-common-env
      DB_HOST: subscription-postgres
      DB_PORT: 5432
      DB_NAME: subscription_db
      DB_USER: telcox
      DB_PASSWORD: telcox
    healthcheck:
