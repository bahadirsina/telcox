        condition: service_healthy
      kafka:
        condition: service_healthy
      discovery-server:
        condition: service_healthy
      config-server:
        condition: service_healthy
    ports:
      - "19010:9010"
    environment:
      <<: *service-common-env
      DB_HOST: ticket-postgres
      DB_PORT: 5432
      DB_NAME: ticket_db
      DB_USER: telcox
      DB_PASSWORD: telcox
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9010/actuator/health | grep -q '\"status\":\"UP\"' || exit 1"]
      <<: *healthcheck-spring
