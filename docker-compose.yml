      <<: *healthcheck-spring

  usage-service:
    <<: *service-common
    build:
      context: ./services/usage-service
    image: telcox/usage-service:1.0.0-SNAPSHOT
    container_name: telcox-usage-service
    depends_on:
      usage-postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
      discovery-server:
        condition: service_healthy
      config-server:
        condition: service_healthy
    ports:
      - "19006:9006"
    environment:
      <<: *service-common-env
      DB_HOST: usage-postgres
      DB_PORT: 5432
      DB_NAME: usage_db
      DB_USER: telcox
      DB_PASSWORD: telcox
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9006/actuator/health | grep -q '\"status\":\"UP\"' || exit 1"]
      <<: *healthcheck-spring

  billing-service:
    <<: *service-common
    build:
      context: ./services/billing-service
    image: telcox/billing-service:1.0.0-SNAPSHOT
    container_name: telcox-billing-service
    depends_on:
      billing-postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
      discovery-server:
        condition: service_healthy
      config-server:
        condition: service_healthy
    ports:
      - "19007:9007"
    environment:
      <<: *service-common-env
      DB_HOST: billing-postgres
      DB_PORT: 5432
      DB_NAME: billing_db
      DB_USER: telcox
      DB_PASSWORD: telcox
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9007/actuator/health | grep -q '\"status\":\"UP\"' || exit 1"]
      <<: *healthcheck-spring

  payment-service:
    <<: *service-common
    build:
      context: ./services/payment-service
    image: telcox/payment-service:1.0.0-SNAPSHOT
    container_name: telcox-payment-service
    depends_on:
      payment-postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
      discovery-server:
        condition: service_healthy
      config-server:
        condition: service_healthy
    ports:
      - "19008:9008"
    environment:
      <<: *service-common-env
      DB_HOST: payment-postgres
      DB_PORT: 5432
      DB_NAME: payment_db
      DB_USER: telcox
      DB_PASSWORD: telcox
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9008/actuator/health | grep -q '\"status\":\"UP\"' || exit 1"]
      <<: *healthcheck-spring

  notification-service:
    <<: *service-common
    build:
      context: ./services/notification-service
    image: telcox/notification-service:1.0.0-SNAPSHOT
    container_name: telcox-notification-service
    depends_on:
      notification-postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
      mailhog:
        condition: service_healthy
      discovery-server:
        condition: service_healthy
      config-server:
        condition: service_healthy
    ports:
      - "19009:9009"
    environment:
      <<: *service-common-env
      DB_HOST: notification-postgres
      DB_PORT: 5432
      DB_NAME: notification_db
      DB_USER: telcox
      DB_PASSWORD: telcox
      SMTP_HOST: mailhog
      SMTP_PORT: 1025
