global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets:
          - prometheus:9090

  - job_name: telcox-infrastructure
    metrics_path: /actuator/prometheus
    static_configs:
      - targets:
          - discovery-server:8761
          - config-server:8888
          - api-gateway:8080

  - job_name: telcox-services
    metrics_path: /actuator/prometheus
    static_configs:
      - targets:
          - bff-service:9011
          - identity-service:9001
          - customer-service:9002
          - product-catalog-service:9003
          - order-service:9004
          - subscription-service:9005
          - usage-service:9006
          - billing-service:9007
          - payment-service:9008
          - notification-service:9009
          - ticket-service:9010
