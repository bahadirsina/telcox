server:
  port: 9005

spring:
  application:
    name: subscription-service
  config:
    import: optional:configserver:${CONFIG_SERVER_URL:http://localhost:18888}
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:15436}/${DB_NAME:subscription_db}
    username: ${DB_USER:telcox}
    password: ${DB_PASSWORD:telcox}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP:localhost:19092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
    consumer:
      group-id: subscription-service
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: "com.telcox.*"

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_URL:http://localhost:18761/eureka/}
