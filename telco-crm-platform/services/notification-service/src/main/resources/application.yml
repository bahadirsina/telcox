server:
  port: 9009

spring:
  application:
    name: notification-service
  config:
    import: optional:configserver:${CONFIG_SERVER_URL:http://localhost:18888}
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:15440}/${DB_NAME:notification_db}
    username: ${DB_USER:telcox}
    password: ${DB_PASSWORD:telcox}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP:localhost:19092}
    consumer:
      group-id: notification-service
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: "com.telcox.*"
  mail:
    host: ${SMTP_HOST:localhost}
    port: ${SMTP_PORT:11025}
    properties:
      mail.smtp.auth: false

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_URL:http://localhost:18761/eureka/}

telcox:
  notification:
    sms:
      mock-mode: true
    push:
      mock-mode: true
