server:
  port: 9002

spring:
  application:
    name: customer-service
  config:
    import: optional:configserver:${CONFIG_SERVER_URL:http://localhost:18888}
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:15433}/${DB_NAME:customer_db}
    username: ${DB_USER:telcox}
    password: ${DB_PASSWORD:telcox}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        jdbc.time_zone: UTC
  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP:localhost:19092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
    consumer:
      group-id: customer-service
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: "com.telcox.*"
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:16379}

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_URL:http://localhost:18761/eureka/}

springdoc:
  swagger-ui:
    path: /swagger-ui.html
